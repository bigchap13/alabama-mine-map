<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mining Companies | Alabama Mine Map</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="topbar">
    <a class="circle linkcircle" href="/">‹</a>
    <strong>Mining Companies</strong>
    <span class="circle">⛏️</span>
  </header>

  <main>
    <section class="hero">
      <p class="eyebrow">Operator and controller index</p>
      <h1>Mining Companies</h1>
      <p>Search operators and controllers connected to source-backed Alabama mine records.</p>
    </section>

    <section class="card map-controls">
      <input id="companySearch" type="search" placeholder="Search company, operator, controller...">
    </section>

    <section class="card">
      <span>Companies</span>
      <h2 id="companyCount">Loading...</h2>
      <p id="companyNote">Showing top companies first. Use search for the full index.</p>
      <div id="companyList"></div>
    </section>
  </main>

  <script src="/static/js/companies.js"></script>
</body>
</html>
